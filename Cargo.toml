[package]
name = "geomanpy"
version = "0.1.1"
edition = "2024"
license = "Apache-2.0"
authors = ["Bowan Foryt <bowan@valstad.com>"]
description = "Python bindings for glam and wreck, providing geometric/linalg primitives and collision detection."
repository = "https://github.com/valstad-shipworks/geomanpy"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []

[dependencies]
approx = "0.5.1"
glam = { version = "0.32.1", features = ["serde", "approx"] }
numpy = "0.28.0"
pyo3 = { version = "0.28.3", features = ["multiple-pymethods"] }
pythonize = "0.28.0"
serde = { version = "1.0.228", features = ["alloc", "derive"] }
serde_json = "1.0"
wreck = { version = "0.3.2", features = ["serde", "approx"] }

[profile.release]
opt-level = 2
lto = true