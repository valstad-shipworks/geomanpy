name: Publish

# Public repo: publishes to PyPI + crates.io.
#
# Build jobs run on every PR and push to main as a dry run of the real release
# pipeline — same targets, same ABIs — so a publish-time breakage (unsupported
# interpreter, packaging error, bad metadata) surfaces in CI before a tag is
# cut. Only the upload jobs are gated on v* tags.
#
# Each platform is built three ways from one source: an `abi3` wheel pinned to
# the minimum supported Python (cp310-abi3, the abi3 cargo feature), a
# version-specific free-threaded `cp314t` wheel (3.14t predates the stable
# free-threaded ABI), and an `abi3t` wheel (the abi3t cargo feature, PEP 803)
# that covers free-threaded and GIL builds of Python 3.15 and newer. The abi3
# flavor is selected by the cargo feature alone and needs no interpreter at
# build time, but abi3t does: maturin cannot resolve the abi3t build without a
# free-threaded interpreter present (it errors "Couldn't find any python
# interpreters" inside the manylinux containers and on cross targets), so abi3t
# is built with `-i python3.14t` exactly like cp314t. The cargo feature still
# controls the wheel tag, so this stays an abi3t wheel.
on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
          - { os: windows-latest, target: aarch64-pc-windows-msvc }
        wheel:
          - { name: abi3, args: "-F abi3", python: "" }
          - { name: abi3t, args: "-F abi3t -i python3.14t", python: "3.14t" }
          - { name: cp314t, args: "-i python3.14t", python: "3.14t" }

    runs-on: ${{ matrix.platform.os }}
    name: ${{ matrix.wheel.name }} wheel (${{ matrix.platform.target }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: matrix.wheel.python != '' && matrix.platform.os != 'ubuntu-latest'
        with:
          python-version: ${{ matrix.wheel.python }}

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist ${{ matrix.wheel.args }}
          manylinux: auto
          docker-options: -e CARGO_NET_RETRY -e CARGO_HTTP_MULTIPLEXING
        env:
          CARGO_NET_RETRY: "10"
          CARGO_HTTP_MULTIPLEXING: "false"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.wheel.name }}-${{ matrix.platform.target }}
          path: dist/*.whl

  sdist:
    runs-on: ubuntu-latest
    name: Build sdist

    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  check-dist:
    runs-on: ubuntu-latest
    name: twine check
    needs: [build-wheels, sdist]

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: astral-sh/setup-uv@v5

      - run: uv tool run twine check --strict dist/*

  crates-dry-run:
    runs-on: ubuntu-latest
    name: cargo publish --dry-run
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: publish-dry-run

      - run: cargo publish --dry-run

  publish-pypi:
    runs-on: ubuntu-latest
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check-dist]

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: astral-sh/setup-uv@v5

      - name: Publish to PyPI
        run: uv publish dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  publish-crates:
    runs-on: ubuntu-latest
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
